name: cozy_feels_app
description: "A new Flutter project."
version: 1.0.0+1
environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10+1
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/svg/
  fonts:
    - family: Dongle
      fonts:
        - asset: assets/fonts/Dongle/Dongle-Light.ttf
          weight: 300
        - asset: assets/fonts/Dongle/Dongle-Regular.ttf
          weight: 400
        - asset: assets/fonts/Dongle/Dongle-Bold.ttf
          weight: 700